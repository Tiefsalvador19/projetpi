<script>

// =============================
// CONFIGURATION
// =============================

// SHA-256 du mot de passe "Eliora19"
const PASSWORD_HASH = "0f0b6a8c6e6c9c5f1d5f0e66db8a7e6a9a9d1e5a3c7d7d89e5a2a9f93f3c2a0f";

const MAX_ATTEMPTS = 5;
const LOCK_TIME = 300000; // 5 minutes
const SESSION_TIMEOUT = 600000; // 10 minutes

let attempts = 0;


// =============================
// HASH PASSWORD
// =============================

async function hashPassword(password) {

    const encoder = new TextEncoder();
    const data = encoder.encode(password);

    const hashBuffer = await crypto.subtle.digest("SHA-256", data);

    const hashArray = Array.from(new Uint8Array(hashBuffer));

    const hashHex = hashArray
        .map(b => b.toString(16).padStart(2,"0"))
        .join("");

    return hashHex;
}


// =============================
// LOGIN SYSTEM
// =============================

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const password = document.getElementById("passwordInput").value;

    if(localStorage.getItem("lockedUntil")){

        const lockedUntil = parseInt(localStorage.getItem("lockedUntil"));

        if(Date.now() < lockedUntil){

            alert("Trop de tentatives. Réessayez plus tard.");
            return;
        }

        localStorage.removeItem("lockedUntil");
    }

    const hashed = await hashPassword(password);

    if(hashed === PASSWORD_HASH){

        document.getElementById("loginOverlay").style.display = "none";

        document.getElementById("documentContainer").style.display = "block";

        document.body.style.overflow = "auto";

        localStorage.setItem("lastActive", Date.now());

        attempts = 0;

    }else{

        attempts++;

        document.getElementById("errorMessage").style.display = "block";

        document.getElementById("passwordInput").value = "";

        if(attempts >= MAX_ATTEMPTS){

            localStorage.setItem("lockedUntil", Date.now() + LOCK_TIME);

            alert("Accès bloqué pendant 5 minutes.");

        }
    }

});


// =============================
// SESSION TIMEOUT
// =============================

setInterval(function(){

    const lastActive = localStorage.getItem("lastActive");

    if(lastActive && Date.now() - lastActive > SESSION_TIMEOUT){

        location.reload();

    }

},60000);


// =============================
// ANTI INSPECT / ANTI COPY
// =============================

// désactiver clic droit
document.addEventListener("contextmenu", e => e.preventDefault());

// désactiver copier
document.addEventListener("copy", e => e.preventDefault());

// désactiver inspect
document.addEventListener("keydown", function(e){

    if(
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
        (e.ctrlKey && e.key === "U")
    ){
        e.preventDefault();
    }

});


// =============================
// ANTI SCREENSHOT BASIQUE
// =============================

document.addEventListener("keyup", function(e){

    if(e.key === "PrintScreen"){

        navigator.clipboard.writeText("");

        alert("Capture écran désactivée.");

    }

});


// =============================
// INITIALISATION
// =============================

window.onload = function(){

    document.getElementById("documentContainer").style.display = "none";

    document.getElementById("loginOverlay").style.display = "flex";

};

</script>
